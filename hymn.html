<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGAC Hymns</title>

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #ffffff;
  overflow-x: hidden;
}

/* WATERMARK */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  background: url('logo.png') no-repeat center/contain;
  opacity: 0.05;
  transform: translate(-50%, -50%);
}

/* HEADER */
header {
  text-align: center;
  padding: 15px;
  font-weight: bold;
  font-size: 18px;
}

/* GLASS EFFECT */
.glass {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.4);
  border-radius: 30px;
  border: 1px solid rgba(0,150,255,0.4);
  box-shadow: 0 0 20px rgba(0,150,255,0.2);
}

/* SEARCH */
.search-box {
  margin: 10px auto;
  width: 90%;
  max-width: 400px;
  padding: 12px;
}

.search-box input {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
}

/* LANGUAGE */
.lang {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
}

.lang div {
  padding: 8px 15px;
  cursor: pointer;
}

.active {
  background: #001f54;
  color: white;
}

/* HYMN DISPLAY TOP */
.viewer {
  margin: 15px;
  padding: 15px;
}

.title {
  font-weight: bold;
  margin-bottom: 10px;
}

/* HYMN GRID */
.hymns {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px,1fr));
  gap: 10px;
  padding: 15px;
}

.hymn {
  text-align: center;
  padding: 12px;
  cursor: pointer;
}

.hymn:hover {
  box-shadow: 0 0 15px rgba(0,150,255,0.6);
}

</style>
</head>

<body>

<header>📖 CGAC Hymns</header>

<!-- DISPLAY FIRST -->
<div class="viewer glass">
  <div class="title" id="title">Select Hymn</div>
  <div id="content"></div>
</div>

<!-- SEARCH -->
<div class="search-box glass">
  <input type="text" id="search" placeholder="Search hymn...">
</div>

<!-- LANGUAGE -->
<div class="lang">
  <div class="glass active" onclick="setLang('english', this)">English</div>
  <div class="glass" onclick="setLang('yoruba', this)">Yoruba</div>
</div>

<!-- HYMN NUMBERS -->
<div class="hymns" id="list"></div>

<script>

let hymns = [];
let lang = "english";

fetch("hymns.json")
.then(res => res.json())
.then(data => {
  hymns = data;
  render(hymns);
});

function render(list) {
  const box = document.getElementById("list");
  box.innerHTML = "";

  list.forEach(h => {
    let div = document.createElement("div");
    div.className = "hymn glass";
    div.innerText = h.id;
    div.onclick = () => show(h);
    box.appendChild(div);
  });
}

function show(h) {
  document.getElementById("title").innerText =
    h.id + ". " + h[lang].title;

  document.getElementById("content").innerText =
    h[lang].lyrics;
}

function setLang(l, el) {
  lang = l;
  document.querySelectorAll(".lang div")
    .forEach(x => x.classList.remove("active"));
  el.classList.add("active");
}

document.getElementById("search").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();

  let filtered = hymns.filter(h =>
    h.english.title.toLowerCase().includes(val)
  );

  render(filtered);
});

</script>

</body>
</html>
