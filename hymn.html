<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hymns</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0a1f44, #1a3d7c);
  color: white;
}

/* WATERMARK LOGO */
body::after {
  content: "";
  background: url('logo.png') no-repeat center;
  background-size: 200px;
  opacity: 0.05;
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
}

/* HEADER */
.header {
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* GLASS CARD */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 15px;
  margin: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* SEARCH BAR */
.search-box {
  position: sticky;
  top: 10px;
  margin: 15px;
}

.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 14px;
}

/* LANGUAGE SWITCH */
.lang-switch {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.lang-btn {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}

.lang-btn.active {
  background: #00bfff;
}

/* HYMN LIST */
.hymn {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
}

/* PASSAGE */
#lyrics {
  margin-top: 10px;
  line-height: 1.7;
}
</style>
</head>

<body>

<div class="header">CGAC Hymns</div>

<div class="search-box glass">
  <input type="text" id="search" placeholder="Search hymn...">
</div>

<div class="glass lang-switch">
  <button class="lang-btn active" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('yo')">Yoruba</button>
</div>

<div class="glass" id="list"></div>

<div class="glass">
  <div id="title"></div>
  <div id="lyrics"></div>
</div>

<script>
let hymns = [];
let currentLang = "en";

fetch("hymns.json")
.then(res => res.json())
.then(data => {
  hymns = data;
  displayHymns(hymns);
});

function displayHymns(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(h => {
    const div = document.createElement("div");
    div.className = "hymn";
    div.innerText = currentLang === "en" ? h.title_en : h.title_yo;

    div.onclick = () => showHymn(h);

    list.appendChild(div);
  });
}

function showHymn(h) {
  document.getElementById("title").innerText =
    currentLang === "en" ? h.title_en : h.title_yo;

  document.getElementById("lyrics").innerText =
    currentLang === "en" ? h.lyrics_en : h.lyrics_yo;
}

function setLang(lang) {
  currentLang = lang;

  document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");

  displayHymns(hymns);
}

document.getElementById("search").addEventListener("input", function() {
  const val = this.value.toLowerCase();

  const filtered = hymns.filter(h =>
    h.title_en.toLowerCase().includes(val) ||
    h.title_yo.toLowerCase().includes(val)
  );

  displayHymns(filtered);
});
</script>

</body>
</html>
