<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hymn Book</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #ffffff;
  color: #111;
}

/* WATERMARK LOGO */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 300px;
  height: 300px;
  background: url('logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.06;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-weight: bold;
  font-size: 18px;
}

/* GLASS EFFECT */
.glass {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.7);
  border-radius: 30px;
  border: 1px solid rgba(0, 150, 255, 0.2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

/* SEARCH BAR */
.search-box {
  margin: 10px auto;
  width: 90%;
  padding: 10px 15px;
  display: flex;
  align-items: center;
}

.search-box input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font-size: 14px;
}

/* LANGUAGE SWITCH */
.lang-switch {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
}

.lang-btn {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
}

.active {
  border: 1px solid #007bff;
}

/* HYMN GRID */
.hymn-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 10px;
  padding: 15px;
}

.hymn {
  text-align: center;
  padding: 10px;
  cursor: pointer;
}

/* DISPLAY */
.display {
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
}

.title {
  font-weight: bold;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<header>Hymn Book</header>

<!-- SEARCH -->
<div class="search-box glass">
  <input type="text" id="search" placeholder="Search hymn number or title...">
</div>

<!-- LANGUAGE -->
<div class="lang-switch">
  <div class="lang-btn glass active" onclick="setLang('English', this)">English</div>
  <div class="lang-btn glass" onclick="setLang('Yoruba', this)">Yoruba</div>
</div>

<!-- HYMN LIST -->
<div class="hymn-list" id="hymnList"></div>

<!-- DISPLAY -->
<div class="display glass">
  <div class="title" id="title">Select a hymn</div>
  <div id="lyrics"></div>
</div>

<script>

let hymns = {};
let currentLang = "English";

fetch('hymns.json')
.then(res => res.json())
.then(data => {
  hymns = data;
  loadHymns();
});

function setLang(lang, el) {
  currentLang = lang;

  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');

  loadHymns();
}

function loadHymns() {
  const list = document.getElementById('hymnList');
  list.innerHTML = "";

  Object.keys(hymns[currentLang]).forEach(num => {
    const div = document.createElement('div');
    div.className = "hymn glass";
    div.innerText = num;
    div.onclick = () => showHymn(num);
    list.appendChild(div);
  });
}

function showHymn(num) {
  const hymn = hymns[currentLang][num];

  document.getElementById('title').innerText =
    `Hymn ${num} - ${hymn.title}`;

  document.getElementById('lyrics').innerText =
    hymn.lyrics;
}

/* SEARCH */
document.getElementById('search').addEventListener('input', function() {
  const value = this.value.toLowerCase();
  const list = document.getElementById('hymnList');

  list.innerHTML = "";

  Object.keys(hymns[currentLang]).forEach(num => {
    const hymn = hymns[currentLang][num];

    if (
      num.includes(value) ||
      hymn.title.toLowerCase().includes(value)
    ) {
      const div = document.createElement('div');
      div.className = "hymn glass";
      div.innerText = num;
      div.onclick = () => showHymn(num);
      list.appendChild(div);
    }
  });
});

</script>

</body>
</html>
