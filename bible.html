<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible</title>

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #ffffff;
}

/* SPLASH SCREEN */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  animation: fadeOut 2s ease forwards;
  animation-delay: 2s;
}

#splash h1 {
  font-size: 22px;
  color: #0a84ff;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #0a84ff; }
  to { text-shadow: 0 0 20px #0a84ff; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  padding: 10px;
}

/* BACK BUTTON */
.back {
  padding: 8px 12px;
  border-radius: 15px;
  margin-right: 10px;
  background: rgba(0,150,255,0.2);
  cursor: pointer;
}

/* SEARCH */
.search {
  margin: 10px;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid rgba(0,150,255,0.3);
}

/* LIST */
.list {
  padding: 10px;
}

/* ITEM */
.item {
  padding: 12px;
  margin: 5px 0;
  border-radius: 15px;
  background: rgba(0,150,255,0.1);
  cursor: pointer;
}

.item:active {
  background: rgba(0,150,255,0.3);
}

/* VERSE VIEW */
#viewer {
  padding: 15px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>📖 CGAC Bible</h1>
</div>

<header>
  <div class="back" onclick="goBack()">← Back</div>
  <h3 id="title">Bible</h3>
</header>

<input type="text" class="search" id="search" placeholder="Search...">

<div class="list" id="list"></div>

<div id="viewer"></div>

<script>

let data = {};
let state = "books"; // books → chapters → verses
let currentBook = "";
let currentChapter = 0;

fetch("bible.json")
.then(res => res.json())
.then(bible => {
  data = bible;
  showBooks();
});

/* SHOW BOOKS */
function showBooks() {
  state = "books";
  document.getElementById("title").innerText = "Books";
  let box = document.getElementById("list");
  box.innerHTML = "";

  Object.keys(data).forEach(book => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = book;
    div.onclick = () => showChapters(book);
    box.appendChild(div);
  });
}

/* SHOW CHAPTERS */
function showChapters(book) {
  state = "chapters";
  currentBook = book;

  document.getElementById("title").innerText = book;

  let box = document.getElementById("list");
  box.innerHTML = "";

  let chapters = data[book];

  for (let i = 1; i <= chapters.length; i++) {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "Chapter " + i;
    div.onclick = () => showVerses(book, i);
    box.appendChild(div);
  }
}

/* SHOW VERSES */
function showVerses(book, chapter) {
  state = "verses";
  currentChapter = chapter;

  document.getElementById("title").innerText =
    book + " " + chapter;

  let verses = data[book][chapter - 1];

  let viewer = document.getElementById("viewer");
  viewer.innerHTML = "";

  verses.forEach((v, i) => {
    let p = document.createElement("p");
    p.innerText = (i + 1) + ". " + v;
    viewer.appendChild(p);
  });

  document.getElementById("list").innerHTML = "";
}

/* BACK */
function goBack() {
  if (state === "verses") {
    showChapters(currentBook);
  } else if (state === "chapters") {
    showBooks();
  } else {
    window.location.href = "index.html";
  }
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();
  let box = document.getElementById("list");
  box.innerHTML = "";

  Object.keys(data).forEach(book => {
    if (book.toLowerCase().includes(val)) {
      let div = document.createElement("div");
      div.className = "item";
      div.innerText = book;
      div.onclick = () => showChapters(book);
      box.appendChild(div);
    }
  });
});

</script>

<!-- OFFLINE -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
