<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #2b1d0e, #120a05);
  color: white;
}

/* Splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #120a05;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 3s forwards;
}

@keyframes fadeOut {
  0% {opacity:1}
  90% {opacity:1}
  100% {opacity:0; visibility:hidden}
}

.bible {
  font-size: 60px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from {text-shadow:0 0 10px gold}
  to {text-shadow:0 0 40px white}
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.back {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
}

/* Search */
.search-box {
  margin: 10px;
  display: flex;
  position: relative;
}

.search-box input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

.search-btn {
  margin-left: 5px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: gold;
  cursor: pointer;
}

/* Star lights */
.search-box::before,
.search-box::after {
  content: "✨✨✨";
  position: absolute;
  left: 10px;
  top: -10px;
  animation: sparkle 2s infinite;
}

@keyframes sparkle {
  0% {opacity:0}
  50% {opacity:1}
  100% {opacity:0}
}

/* Selectors */
.selector {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.selector select {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* Verses */
#bibleText {
  padding: 15px;
}

.verse {
  margin-bottom: 10px;
}

.verse b {
  color: gold;
}

.highlight {
  background: rgba(255,255,0,0.2);
}
</style>
</head>

<body>

<div id="splash">
  <div class="bible">📖✝️</div>
</div>

<div class="header">
  <button class="back" onclick="history.back()">← Back</button>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search verse...">
  <button class="search-btn" onclick="searchVerse()">🔍</button>
</div>

<div class="selector">
  <select id="bookSelect"></select>
  <select id="chapterSelect"></select>
</div>

<div id="bibleText"></div>

<script>
let bibleData = [];
let currentVerses = [];

fetch("bible.json")
.then(res => res.json())
.then(data => {
  bibleData = data;
  loadBooks();
});

function loadBooks() {
  const bookSelect = document.getElementById("bookSelect");
  bookSelect.innerHTML = "";

  bibleData.forEach((book, index) => {
    const opt = document.createElement("option");
    opt.value = index;
    opt.textContent = book.name;
    bookSelect.appendChild(opt);
  });

  loadChapters();
}

function loadChapters() {
  const bookIndex = document.getElementById("bookSelect").value;
  const chapterSelect = document.getElementById("chapterSelect");
  chapterSelect.innerHTML = "";

  const chapters = bibleData[bookIndex].chapters;

  chapters.forEach((ch, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = "Chapter " + ch.chapter;
    chapterSelect.appendChild(opt);
  });

  displayVerses();
}

function displayVerses() {
  const bookIndex = document.getElementById("bookSelect").value;
  const chapterIndex = document.getElementById("chapterSelect").value;

  const verses = bibleData[bookIndex].chapters[chapterIndex].verses;
  currentVerses = verses;

  const container = document.getElementById("bibleText");
  container.innerHTML = "";

  verses.forEach(v => {
    const p = document.createElement("p");
    p.className = "verse";
    p.innerHTML = `<b>${v.verse}</b> ${v.text}`;
    container.appendChild(p);
  });
}

function searchVerse() {
  const query = document.getElementById("searchInput").value.toLowerCase();

  const filtered = currentVerses.filter(v => 
    v.text.toLowerCase().includes(query) || v.verse.toString() === query
  );

  const container = document.getElementById("bibleText");
  container.innerHTML = "";

  filtered.forEach(v => {
    const p = document.createElement("p");
    p.className = "verse highlight";
    p.innerHTML = `<b>${v.verse}</b> ${v.text}`;
    container.appendChild(p);
  });
}

// Events
document.getElementById("bookSelect").addEventListener("change", loadChapters);
document.getElementById("chapterSelect").addEventListener("change", displayVerses);
</script>

</body>
</html>
