<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    select, button {
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    #bible {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      background: #fff;
      margin-top: 10px;
      border-radius: 8px;
    }

    h2 {
      text-align: center;
    }

    p {
      line-height: 1.6;
    }

    b {
      color: #555;
    }
  </style>
</head>

<body>

<header>
  <h1>📖 Bible</h1>
</header>

<div class="controls">
  <select id="bookSelect" onchange="changeBook(this.value)">
    <option>Genesis</option>
    <option>Exodus</option>
    <option>Leviticus</option>
    <option>Numbers</option>
    <option>Deuteronomy</option>
    <option>Joshua</option>
    <option>Judges</option>
    <option>Ruth</option>
    <option>1Samuel</option>
    <option>2Samuel</option>
    <option>1Kings</option>
    <option>2Kings</option>
    <option>1Chronicles</option>
    <option>2Chronicles</option>
    <option>Ezra</option>
    <option>Nehemiah</option>
    <option>Esther</option>
    <option>Job</option>
    <option>Psalms</option>
    <option>Proverbs</option>
    <option>Ecclesiastes</option>
    <option>SongOfSolomon</option>
    <option>Isaiah</option>
    <option>Jeremiah</option>
    <option>Lamentations</option>
    <option>Ezekiel</option>
    <option>Daniel</option>
    <option>Hosea</option>
    <option>Joel</option>
    <option>Amos</option>
    <option>Obadiah</option>
    <option>Jonah</option>
    <option>Micah</option>
    <option>Nahum</option>
    <option>Habakkuk</option>
    <option>Zephaniah</option>
    <option>Haggai</option>
    <option>Zechariah</option>
    <option>Malachi</option>
    <option>Matthew</option>
    <option>Mark</option>
    <option>Luke</option>
    <option>John</option>
    <option>Acts</option>
    <option>Romans</option>
    <option>1Corinthians</option>
    <option>2Corinthians</option>
    <option>Galatians</option>
    <option>Ephesians</option>
    <option>Philippians</option>
    <option>Colossians</option>
    <option>1Thessalonians</option>
    <option>2Thessalonians</option>
    <option>1Timothy</option>
    <option>2Timothy</option>
    <option>Titus</option>
    <option>Philemon</option>
    <option>Hebrews</option>
    <option>James</option>
    <option>1Peter</option>
    <option>2Peter</option>
    <option>1John</option>
    <option>2John</option>
    <option>3John</option>
    <option>Jude</option>
    <option>Revelation</option>
  </select>

  <button onclick="prevChapter()">⬅ Prev</button>
  <button onclick="nextChapter()">Next ➡</button>
</div>

<div id="bible">Loading...</div>

<script>
let currentBook = "Genesis";
let currentChapter = 1;
let version = "kjv";

// load book
async function loadBook() {
  try {
    const res = await fetch(`bibles/${version}/${currentBook}.json`);
    const data = await res.json();

    displayChapter(data);
  } catch (err) {
    document.getElementById("bible").innerHTML = "❌ Failed to load book";
    console.error(err);
  }
}

// display chapter
function displayChapter(data) {
  const container = document.getElementById("bible");

  const chapterData = data.chapters.find(
    ch => ch.chapter === currentChapter
  );

  if (!chapterData) {
    container.innerHTML = "Chapter not found";
    return;
  }

  let html = `<h2>${data.book} ${currentChapter}</h2>`;

  chapterData.verses.forEach(v => {
    html += `<p><b>${v.verse}</b> ${v.text}</p>`;
  });

  container.innerHTML = html;
}

// change book
function changeBook(book) {
  currentBook = book;
  currentChapter = 1;
  loadBook();
}

// navigation
function nextChapter() {
  currentChapter++;
  loadBook();
}

function prevChapter() {
  if (currentChapter > 1) {
    currentChapter--;
    loadBook();
  }
}

// start
loadBook();
</script>

</body>
</html>
