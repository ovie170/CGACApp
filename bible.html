<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holy Bible</title>

<style>
body{
  margin:0;
  font-family: Georgia, serif;
  background:#f4e4b8; /* milky gold */
  overflow-x:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#splash h1{
  color:gold;
  font-size:40px;
  text-shadow:0 0 20px gold,0 0 40px gold;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{opacity:0.7}
  to{opacity:1}
}

/* GLASS */
.glass{
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.2);
  border-radius:15px;
  padding:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* HEADER */
#top{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
}

#backBtn{
  cursor:pointer;
}

/* SEARCH */
#searchBox{
  display:flex;
  gap:10px;
  margin:10px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  border-radius:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* BOOKS */
#books{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.book{
  text-align:center;
  padding:15px;
  cursor:pointer;
}

/* CHAPTERS */
#chapters, #verses{
  padding:10px;
}

.chapterBtn{
  margin:5px;
}

/* WATERMARK */
#watermark{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.05;
  width:250px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>HOLY BIBLE</h1>
</div>

<img src="logo.png" id="watermark">

<div id="top" class="glass">
  <button id="backBtn" onclick="goBack()">⬅</button>
  <h3 id="title">Bible</h3>
</div>

<div id="searchBox" class="glass">
  <input type="text" id="searchInput" placeholder="Search verse...">
  <button onclick="search()">Search</button>
</div>

<div id="books"></div>
<div id="chapters"></div>
<div id="verses"></div>

<script>

// SPLASH
setTimeout(()=>{
  document.getElementById('splash').style.display='none';
},5000);

// ONLY GENESIS (for now)
const books=["Genesis"];

let currentBookData=null;
let historyStack=[];

// LOAD BOOK LIST
function loadBooks(){
  let container=document.getElementById('books');
  container.innerHTML="";

  books.forEach(b=>{
    let div=document.createElement('div');
    div.className="book glass";
    div.innerText=b;

    div.onclick=()=>loadBook(b);

    container.appendChild(div);
  });
}

// LOAD BOOK JSON
async function loadBook(book){
  let res=await fetch(book+".json");
  let data=await res.json();

  currentBookData=data;

  document.getElementById('title').innerText=data.book;

  document.getElementById('books').innerHTML="";
  document.getElementById('verses').innerHTML="";

  let chaptersDiv=document.getElementById('chapters');
  chaptersDiv.innerHTML="";

  data.chapters.forEach(ch=>{
    let btn=document.createElement('button');
    btn.className="chapterBtn glass";
    btn.innerText="Chapter "+ch.chapter;

    btn.onclick=()=>showChapter(ch);

    chaptersDiv.appendChild(btn);
  });

  historyStack.push('books');
}

// SHOW CHAPTER
function showChapter(ch){
  let versesDiv=document.getElementById('verses');
  versesDiv.innerHTML="";

  document.getElementById('chapters').innerHTML="";

  ch.verses.forEach(v=>{
    let p=document.createElement('p');
    p.innerHTML="<b>"+v.verse+"</b> "+v.text;
    versesDiv.appendChild(p);
  });

  historyStack.push('chapters');
}

// BACK BUTTON
function goBack(){
  location.reload();
}

// SEARCH
function search(){
  let q=document.getElementById('searchInput').value.toLowerCase();
  if(!currentBookData) return;

  let versesDiv=document.getElementById('verses');
  versesDiv.innerHTML="";

  currentBookData.chapters.forEach(ch=>{
    ch.verses.forEach(v=>{
      if(v.text.toLowerCase().includes(q)){
        let p=document.createElement('p');
        p.innerHTML="<b>"+ch.chapter+":"+v.verse+"</b> "+v.text;
        versesDiv.appendChild(p);
      }
    });
  });
}

loadBooks();

</script>

</body>
</html>
