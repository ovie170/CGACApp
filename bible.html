<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #2b1d0e, #1a1208);
  color: #fff;
}

/* Splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #1a1208;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeOut 3s forwards;
}

@keyframes fadeOut {
  0% {opacity:1}
  80% {opacity:1}
  100% {opacity:0; visibility:hidden}
}

.bible-icon {
  font-size: 50px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from {text-shadow:0 0 10px gold}
  to {text-shadow:0 0 30px white}
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.back-btn {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
}

/* Search */
.search-box {
  display: flex;
  margin: 10px;
}

.search-box input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.search-btn {
  margin-left: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: gold;
  cursor: pointer;
  animation: starGlow 1s infinite alternate;
}

@keyframes starGlow {
  from {box-shadow:0 0 5px gold}
  to {box-shadow:0 0 20px white}
}

/* Content */
#bibleText {
  padding: 15px;
}

.verse {
  margin-bottom: 10px;
  line-height: 1.5;
}

.verse b {
  color: gold;
}

.highlight {
  background: rgba(255,255,0,0.2);
}

</style>
</head>

<body>

<div id="splash">
  <div class="bible-icon">📖✝️</div>
</div>

<div class="header">
  <button class="back-btn" onclick="history.back()">← Back</button>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search verse...">
  <button class="search-btn" onclick="searchVerse()">🔍</button>
</div>

<div id="bibleText"></div>

<script>
let allVerses = [];

fetch("bible1.json")
.then(res => res.json())
.then(data => {
  const chapter = data.chapter ? data.verses : data.Genesis[0].verses || data.verses;

  allVerses = chapter;
  displayVerses(chapter);
});

function displayVerses(verses) {
  const container = document.getElementById("bibleText");
  container.innerHTML = "";

  verses.forEach(v => {
    const p = document.createElement("p");
    p.className = "verse";
    p.innerHTML = `<b>${v.verse}</b> ${v.text}`;
    container.appendChild(p);
  });
}

function searchVerse() {
  const query = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allVerses.filter(v => 
    v.text.toLowerCase().includes(query) || v.verse.toString() === query
  );

  displayVerses(filtered);
}
</script>

</body>
</html>
