<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGAC Bible</title>

<style>

/* BACKGROUND */
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #3b2a1f; /* deep brown */
  color: #fff;
}

/* WATERMARK */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  background: url('logo.png') center/contain no-repeat;
  opacity: 0.05;
  transform: translate(-50%, -50%);
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #3b2a1f;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 2s ease forwards;
  animation-delay: 2.5s;
}

.book {
  width: 60px;
  height: 40px;
  border: 2px solid white;
  border-radius: 4px;
  position: relative;
  animation: openBook 2s infinite alternate;
}

.book::after {
  content: "+";
  position: absolute;
  top: -20px;
  left: 18px;
  font-size: 20px;
  animation: glow 1.5s infinite alternate;
}

@keyframes openBook {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(20deg); }
}

@keyframes glow {
  from { text-shadow: 0 0 5px white; }
  to { text-shadow: 0 0 20px #0a84ff; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  padding: 10px;
}

/* BACK BUTTON */
.back {
  padding: 8px 14px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  margin-right: 10px;
}

/* SEARCH */
.search-box {
  padding: 10px;
}

.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 10px rgba(255,255,255,0.2);
  animation: starGlow 2s infinite alternate;
}

@keyframes starGlow {
  from { box-shadow: 0 0 5px #fff; }
  to { box-shadow: 0 0 20px #0a84ff; }
}

/* LIST BOX (Books + Chapters ONLY) */
.item {
  margin: 8px 10px;
  padding: 12px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(6px);
  cursor: pointer;
}

/* VERSES */
#viewer {
  padding: 15px;
}

#viewer p {
  line-height: 1.6;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="book"></div>
  <p>Opening Bible...</p>
</div>

<header>
  <div class="back" onclick="goBack()">←</div>
  <h3 id="title">Bible (KJV)</h3>
</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search book...">
</div>

<div id="list"></div>
<div id="viewer"></div>

<script>

let rawData = [];
let data = {};
let state = "books";
let currentBook = "";
let currentChapter = 0;

/* LOAD RAW JSON */
fetch("bible.json")
.then(res => res.json())
.then(bible => {

  rawData = bible;

  // CONVERT RAW FORMAT
  bible.forEach(v => {
    let book = v.book;
    let chapter = v.chapter - 1;

    if (!data[book]) data[book] = [];
    if (!data[book][chapter]) data[book][chapter] = [];

    data[book][chapter].push(v.text);
  });

  showBooks();
});

/* SHOW BOOKS */
function showBooks() {
  state = "books";
  title.innerText = "Books";

  list.innerHTML = "";
  viewer.innerHTML = "";

  Object.keys(data).forEach(book => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = book;
    div.onclick = () => showChapters(book);
    list.appendChild(div);
  });
}

/* CHAPTERS */
function showChapters(book) {
  state = "chapters";
  currentBook = book;

  title.innerText = book;
  list.innerHTML = "";
  viewer.innerHTML = "";

  data[book].forEach((c, i) => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "Chapter " + (i+1);
    div.onclick = () => showVerses(book, i);
    list.appendChild(div);
  });
}

/* VERSES (FULL PAGE TEXT STYLE) */
function showVerses(book, chapter) {
  state = "verses";
  currentChapter = chapter;

  title.innerText = book + " " + (chapter+1);
  list.innerHTML = "";

  viewer.innerHTML = data[book][chapter]
    .map((v,i)=> `<p><b>${i+1}</b> ${v}</p>`)
    .join("");
}

/* BACK */
function goBack() {
  if (state === "verses") showChapters(currentBook);
  else if (state === "chapters") showBooks();
  else window.location.href = "index.html";
}

/* SEARCH */
search.addEventListener("input", e => {
  let val = e.target.value.toLowerCase();
  list.innerHTML = "";

  Object.keys(data).forEach(book => {
    if (book.toLowerCase().includes(val)) {
      let div = document.createElement("div");
      div.className = "item";
      div.innerText = book;
      div.onclick = () => showChapters(book);
      list.appendChild(div);
    }
  });
});

/* OFFLINE */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
