<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holy Bible</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #87ceeb, #e0f7ff);
  overflow-x: hidden;
}

/* SPLASH */
#splash {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #4facfe, #00c6ff);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 999;
  animation: fadeOut 2s ease forwards;
  animation-delay: 2s;
}

#splash h1 {
  font-size: 40px;
  animation: zoom 2s infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* GLASS STYLE */
.glass {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.3);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

/* BUTTON */
button, select, input {
  border: none;
  outline: none;
}

/* WATERMARK */
#watermark {
  position: fixed;
  bottom: 20px;
  right: 20px;
  opacity: 0.1;
  width: 120px;
  height: 120px;
  border-radius: 50%;
}

/* CONTENT */
#content {
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

/* VERSES */
#bible p {
  line-height: 1.7;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>📖 Holy Bible</h1>
  <p>KJV Version</p>
</div>

<!-- WATERMARK -->
<img src="logo.png" id="watermark">

<!-- HEADER -->
<div class="header">
  <button class="glass">⬅ Back</button>

  <select class="glass" id="version">
    <option value="kjv">KJV</option>
  </select>
</div>

<!-- CONTROLS -->
<div id="content">

  <div class="glass">
    <input type="text" placeholder="🔍 Search..." style="width:70%">
    <button class="glass">Search</button>
  </div>

  <br>

  <div class="glass">
    <select id="bookSelect" onchange="changeBook(this.value)">
      <option>Genesis</option>
      <option>Exodus</option>
      <option>Leviticus</option>
      <option>Numbers</option>
      <option>Deuteronomy</option>
      <!-- you can keep adding -->
    </select>

    <button onclick="prevChapter()">⬅</button>
    <button onclick="nextChapter()">➡</button>
  </div>

  <br>

  <!-- VERSES -->
  <div id="bible" class="glass">Loading...</div>

</div>

<script>
let currentBook = "Genesis";
let currentChapter = 1;

async function loadBook() {
  try {
    const res = await fetch(${currentBook}.json`);

    if (!res.ok) throw new Error("File not found");

    const data = await res.json();

    displayChapter(data);

  } catch (err) {
    document.getElementById("bible").innerHTML =
      "❌ Cannot load book. Check file path.";
    console.error(err);
  }
}

function displayChapter(data) {
  const container = document.getElementById("bible");

  const chapter = data.chapters.find(
    c => c.chapter === currentChapter
  );

  if (!chapter) {
    container.innerHTML = "Chapter not found";
    return;
  }

  let html = `<h2>${data.book} ${currentChapter}</h2>`;

  chapter.verses.forEach(v => {
    html += `<p><b>${v.verse}</b> ${v.text}</p>`;
  });

  container.innerHTML = html;
}

function changeBook(book) {
  currentBook = book;
  currentChapter = 1;
  loadBook();
}

function nextChapter() {
  currentChapter++;
  loadBook();
}

function prevChapter() {
  if (currentChapter > 1) {
    currentChapter--;
    loadBook();
  }
}

loadBook();
</script>

</body>
</html>
