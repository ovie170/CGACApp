<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGAC Bible</title>

<style>
body {
  margin:0;
  font-family: Georgia, serif;
  background:#2b1b12;
  color:white;
}

/* SPLASH SCREEN */
#splash {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#2b1b12;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.bible {
  width:80px;
  height:60px;
  background:#fff;
  position:relative;
  animation:openBook 2s infinite alternate;
}

.bible:before {
  content:"";
  position:absolute;
  width:2px;
  height:100%;
  background:#2b1b12;
  left:50%;
}

.cross {
  width:20px;
  height:20px;
  position:absolute;
  top:-30px;
}

.cross:before, .cross:after {
  content:"";
  position:absolute;
  background:#00aaff;
}

.cross:before { width:4px; height:20px; left:8px; }
.cross:after { height:4px; width:20px; top:8px; }

@keyframes openBook {
  from { transform:scale(1) rotateY(0deg); }
  to { transform:scale(1.1) rotateY(20deg); }
}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
}

.back {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

/* SEARCH */
.search-box {
  margin:10px;
  display:flex;
  gap:10px;
}

.search-box input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:white;
}

.search-box button {
  padding:10px;
  border:none;
  border-radius:20px;
  background:#00aaff;
  color:white;
}

/* LISTS */
fetch("bible1.json")
  .then(res => res.json())
  .then(data => {
    const chapter = data.Genesis["1"]; // Chapter 1

    const container = document.getElementById("bibleText");
    container.innerHTML = "";

    chapter.forEach(v => {
      const verseEl = document.createElement("p");
      verseEl.innerHTML = `<b>${v.verse}</b> ${v.text}`;
      container.appendChild(verseEl);
    });
  });

.card {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(8px);
  padding:10px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

/* PASSAGE */
.passage {
  padding:15px;
  line-height:1.8;
}
</style>
</head>
<body>

<div id="splash">
  <div class="cross"></div>
  <div class="bible"></div>
  <h2>Opening Bible...</h2>
</div>

<div class="header">
  <div class="back" onclick="goBack()">← Back</div>
  <h3>Holy Bible</h3>
</div>

<div class="search-box">
  <input id="search" placeholder="Search verse...">
  <button onclick="searchBible()">Search</button>
</div>

<div id="books" class="grid"></div>
<div id="chapters" class="grid"></div>
<div id="passage" class="passage"></div>

<script>
let bible = {};
let currentBook = null;

// LOAD MULTIPLE FILES
async function loadBible() {
  for (let i = 1; i <= 5; i++) {
    try {
      let res = await fetch(`bible${i}.json`);
      let data = await res.json();
      Object.assign(bible, data);
    } catch(e) {}
  }

  loadBooks();
  document.getElementById('splash').style.display = 'none';
}

function loadBooks() {
  let div = document.getElementById('books');
  div.innerHTML = '';

  Object.keys(bible).forEach(book => {
    let d = document.createElement('div');
    d.className = 'card';
    d.innerText = book;
    d.onclick = () => loadChapters(book);
    div.appendChild(d);
  });
}

function loadChapters(book) {
  currentBook = book;
  let div = document.getElementById('chapters');
  div.innerHTML = '';

  bible[book].forEach((ch, i) => {
    let d = document.createElement('div');
    d.className = 'card';
    d.innerText = i + 1;
    d.onclick = () => showChapter(i);
    div.appendChild(d);
  });
}

function showChapter(index) {
  let text = '';
  bible[currentBook][index].forEach((v, i) => {
    text += `<b>${i+1}</b> ${v}<br><br>`;
  });

  document.getElementById('passage').innerHTML = text;
}

function searchBible() {
  let q = document.getElementById('search').value.toLowerCase();
  let result = '';

  Object.keys(bible).forEach(book => {
    bible[book].forEach((ch, ci) => {
      ch.forEach((v, vi) => {
        if (v.toLowerCase().includes(q)) {
          result += `<b>${book} ${ci+1}:${vi+1}</b> ${v}<br><br>`;
        }
      });
    });
  });

  document.getElementById('passage').innerHTML = result || 'No result found';
}

function goBack() {
  document.getElementById('chapters').innerHTML = '';
  document.getElementById('passage').innerHTML = '';
}

loadBible();
</script>

</body>
</html>
