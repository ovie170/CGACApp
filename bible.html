<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGAC Bible</title>

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
}

/* WATERMARK */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  background: url('logo.png') center/contain no-repeat;
  opacity: 0.05;
  transform: translate(-50%, -50%);
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 2s ease forwards;
  animation-delay: 2s;
}

#splash h1 {
  color: #0a84ff;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #0a84ff; }
  to { text-shadow: 0 0 25px #0a84ff; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  padding: 10px;
}

/* BACK BUTTON */
.back {
  padding: 8px 12px;
  border-radius: 20px;
  background: rgba(0,150,255,0.2);
  backdrop-filter: blur(10px);
  margin-right: 10px;
  cursor: pointer;
}

/* SEARCH */
.search-box {
  padding: 10px;
}

.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 10px rgba(0,150,255,0.3);
}

/* LIST */
.list {
  padding: 10px;
}

/* ITEM */
.item {
  padding: 12px;
  margin: 6px 0;
  border-radius: 20px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,150,255,0.2);
  cursor: pointer;
  transition: 0.2s;
}

.item:active {
  transform: scale(0.96);
  box-shadow: 0 0 20px rgba(0,150,255,0.5);
}

/* VERSES */
#viewer {
  padding: 15px;
}

#viewer p {
  margin-bottom: 10px;
  line-height: 1.6;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>📖 Opening Bible...</h1>
</div>

<header>
  <div class="back" onclick="goBack()">←</div>
  <h3 id="title">Bible</h3>
</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search book...">
</div>

<div class="list" id="list"></div>
<div id="viewer"></div>

<script>

let data = {};
let state = "books";
let currentBook = "";
let currentChapter = 0;

/* LOAD BIBLE */
fetch("kjv.json")
.then(res => res.json())
.then(bible => {

  // AUTO-CONVERT IF RAW FORMAT
  if (Array.isArray(bible)) {
    let formatted = {};

    bible.forEach(v => {
      let book = v.book;
      let chapter = v.chapter - 1;

      if (!formatted[book]) formatted[book] = [];
      if (!formatted[book][chapter]) formatted[book][chapter] = [];

      formatted[book][chapter].push(v.text);
    });

    data = formatted;
  } else {
    data = bible;
  }

  showBooks();
});

/* SHOW BOOKS */
function showBooks() {
  state = "books";
  document.getElementById("title").innerText = "Books";
  let box = document.getElementById("list");
  box.innerHTML = "";

  Object.keys(data).forEach(book => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = book;
    div.onclick = () => showChapters(book);
    box.appendChild(div);
  });

  document.getElementById("viewer").innerHTML = "";
}

/* CHAPTERS */
function showChapters(book) {
  state = "chapters";
  currentBook = book;
  document.getElementById("title").innerText = book;

  let box = document.getElementById("list");
  box.innerHTML = "";

  let chapters = data[book];

  chapters.forEach((c, i) => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "Chapter " + (i + 1);
    div.onclick = () => showVerses(book, i);
    box.appendChild(div);
  });
}

/* VERSES */
function showVerses(book, chapter) {
  state = "verses";
  currentChapter = chapter;

  document.getElementById("title").innerText =
    book + " " + (chapter + 1);

  let viewer = document.getElementById("viewer");
  viewer.innerHTML = "";

  data[book][chapter].forEach((v, i) => {
    let p = document.createElement("p");
    p.innerHTML = "<b>" + (i+1) + "</b> " + v;
    viewer.appendChild(p);
  });

  document.getElementById("list").innerHTML = "";
}

/* BACK */
function goBack() {
  if (state === "verses") {
    showChapters(currentBook);
  } else if (state === "chapters") {
    showBooks();
  } else {
    window.location.href = "index.html";
  }
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();
  let box = document.getElementById("list");
  box.innerHTML = "";

  Object.keys(data).forEach(book => {
    if (book.toLowerCase().includes(val)) {
      let div = document.createElement("div");
      div.className = "item";
      div.innerText = book;
      div.onclick = () => showChapters(book);
      box.appendChild(div);
    }
  });
});

/* OFFLINE */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
