<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1a1208,#000);
  color:white;
}

/* Splash */
#splash{
  position:fixed;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  animation:fadeOut 3s forwards;
}

#splash h1{
  font-size:60px;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px gold;}
  to{ text-shadow:0 0 50px white;}
}

@keyframes fadeOut{
  90%{opacity:1}
  100%{opacity:0; visibility:hidden}
}

/* Controls */
.controls{
  padding:10px;
  display:flex;
  gap:10px;
}

select{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* Search */
.search{
  padding:10px;
  position:relative;
}

.search input{
  width:100%;
  padding:15px;
  border-radius:20px;
  border:none;
}

.search button{
  margin-top:5px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:gold;
  animation:glow 1.5s infinite alternate;
}

/* Verses */
#text{
  padding:15px;
}

.verse{
  margin-bottom:10px;
}

.highlight{
  background:rgba(255,255,0,0.2);
}
</style>
</head>

<body>

<div id="splash"><h1>📖</h1></div>

<div class="controls">
  <select id="version">
    <option value="kjv">KJV</option>
  </select>

  <select id="book"></select>
  <select id="chapter"></select>
</div>

<div class="search">
  <input id="searchInput" placeholder="Search verse...">
  <button onclick="search()">Search</button>
</div>

<div id="text"></div>

<script>
const books = [
"Genesis","Exodus","Leviticus","Numbers","Deuteronomy",
"Joshua","Judges","Ruth","1 Samuel","2 Samuel",
"1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra",
"Nehemiah","Esther","Job","Psalms","Proverbs",
"Ecclesiastes","Song of Solomon","Isaiah","Jeremiah","Lamentations",
"Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah",
"Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi",
"Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians",
"2 Corinthians","Galatians","Ephesians","Philippians","Colossians",
"1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus",
"Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John",
"3 John","Jude","Revelation"
];

let currentData = null;
let currentVerses = [];

// Load books
const bookSelect = document.getElementById("book");
books.forEach(b=>{
  let opt=document.createElement("option");
  opt.textContent=b;
  bookSelect.appendChild(opt);
});

loadBook();

bookSelect.addEventListener("change", loadBook);
document.getElementById("chapter").addEventListener("change", display);

// Load selected book
function loadBook(){
  let version=document.getElementById("version").value;
  let book=bookSelect.value;

  fetch(`bibles/${version}/${book}.json`)
  .then(res=>res.json())
  .then(data=>{
    currentData=data;
    loadChapters();
  });
}

// Load chapters
function loadChapters(){
  let chapterSelect=document.getElementById("chapter");
  chapterSelect.innerHTML="";

  currentData.chapters.forEach((c,i)=>{
    let opt=document.createElement("option");
    opt.value=i;
    opt.textContent="Chapter "+c.chapter;
    chapterSelect.appendChild(opt);
  });

  display();
}

// Display verses
function display(){
  let chapterIndex=document.getElementById("chapter").value;
  let verses=currentData.chapters[chapterIndex].verses;
  currentVerses=verses;

  let container=document.getElementById("text");
  container.innerHTML="";

  verses.forEach(v=>{
    let p=document.createElement("p");
    p.className="verse";
    p.innerHTML=`<b>${v.verse}</b> ${v.text}`;
    container.appendChild(p);
  });
}

// Search
function search(){
  let q=document.getElementById("searchInput").value.toLowerCase();

  let results=currentVerses.filter(v =>
    v.text.toLowerCase().includes(q) || v.verse == q
  );

  let container=document.getElementById("text");
  container.innerHTML="";

  results.forEach(v=>{
    let p=document.createElement("p");
    p.className="verse highlight";
    p.innerHTML=`<b>${v.verse}</b> ${v.text}`;
    container.appendChild(p);
  });
}
</script>

</body>
</html>
