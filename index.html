<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CGAC App</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0a84ff">

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #ffffff;
}

/* WATERMARK LOGO */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  background: url('logo.png') no-repeat center/contain;
  opacity: 0.05;
  transform: translate(-50%, -50%);
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

header p {
  margin: 5px 0;
  font-size: 12px;
  opacity: 0.6;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px,1fr));
  gap: 15px;
  padding: 15px;
}

/* GLASS CARD */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.5);
  border-radius: 25px;
  padding: 20px;
  text-align: center;
  cursor: pointer;

  border: 1px solid rgba(0,150,255,0.3);
  box-shadow: 0 0 15px rgba(0,150,255,0.2);

  transition: 0.3s ease;
}

/* TOUCH EFFECT */
.card:active {
  transform: scale(0.95);
  box-shadow: 0 0 30px rgba(0,150,255,0.7);
}

/* ICON */
.icon {
  width: 35px;
  height: 35px;
  margin-bottom: 10px;
}

/* TEXT */
.card h3 {
  margin: 5px 0;
  font-size: 16px;
}

.card p {
  font-size: 12px;
  opacity: 0.7;
}

/* FOOTER */
footer {
  text-align: center;
  font-size: 12px;
  padding: 15px;
  opacity: 0.6;
}

</style>
</head>

<body>

<header>
  <h1>⛪ CGAC</h1>
  <p>Christ Gospel Apostolic Church</p>
</header>

<div class="container">

  <!-- BIBLE -->
  <a href="bible.html">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M6 4h10a2 2 0 0 1 2 2v14H8a2 2 0 0 0-2-2z"/>
      </svg>
      <h3>Bible</h3>
      <p>Read Scriptures</p>
    </div>
  </a>

  <!-- HYMN -->
  <a href="hymn.html">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M12 3v10.55a4 4 0 1 0 2 3.45V7h4V3z"/>
      </svg>
      <h3>Hymns</h3>
      <p>English & Yoruba</p>
    </div>
  </a>

  <!-- SERMON -->
  <a href="sermon.html">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M4 4h16v14H5.17L4 19.17z"/>
      </svg>
      <h3>Sermons</h3>
      <p>Watch & Listen</p>
    </div>
  </a>

  <!-- NOTES -->
  <a href="notes.html">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M5 3h14v18H5z"/>
      </svg>
      <h3>Notes</h3>
      <p>Write & Save</p>
    </div>
  </a>

  <!-- PRAYER -->
  <a href="prayer.html">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M12 2l4 4-4 4-4-4z"/>
      </svg>
      <h3>Prayer</h3>
      <p>Prayer Requests</p>
    </div>
  </a>

  <!-- LIVE -->
  <a href="live.html">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M3 10v4l6 3V7zM14 7h4v10h-4z"/>
      </svg>
      <h3>Live</h3>
      <p>Watch Service</p>
    </div>
  </a>

</div>

<footer>
  © 2026 CGL Media
</footer>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Offline Ready ✅"));
}
</script>

</body>
</html>
