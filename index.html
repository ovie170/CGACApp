<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaskNova</title>

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #ffffff;
  overflow-x: hidden;
}

/* WATERMARK LOGO */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 260px;
  height: 260px;
  background: url('logo.png') no-repeat center/contain;
  opacity: 0.04;
  transform: translate(-50%, -50%);
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap: 15px;
  padding: 15px;
}

/* GLASS CARD */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.5);
  border-radius: 25px;
  padding: 20px;
  text-align: center;
  cursor: pointer;

  border: 1px solid rgba(0,150,255,0.3);
  box-shadow: 0 0 15px rgba(0,150,255,0.2);

  transition: 0.3s ease;
}

/* BLUE LIGHT TOUCH EFFECT */
.card:active {
  transform: scale(0.96);
  box-shadow: 0 0 25px rgba(0,150,255,0.7);
}

/* ICON */
.icon {
  width: 35px;
  height: 35px;
  margin-bottom: 10px;
}

/* TEXT */
.card h3 {
  margin: 5px 0;
  font-size: 16px;
}

.card p {
  font-size: 12px;
  opacity: 0.7;
}

</style>
</head>

<body>

<header>✨ MaskNova</header>

<div class="container">

  <!-- HYMN -->
  <a href="hymn.html" style="text-decoration:none;color:inherit;">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M12 3v10.55a4 4 0 1 0 2 3.45V7h4V3z"/>
      </svg>
      <h3>Hymns</h3>
      <p>English & Yoruba</p>
    </div>
  </a>

  <!-- SERMON -->
  <a href="sermon.html" style="text-decoration:none;color:inherit;">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M4 4h16v14H5.17L4 19.17z"/>
      </svg>
      <h3>Sermons</h3>
      <p>Watch & Listen</p>
    </div>
  </a>

  <!-- NOTES -->
  <a href="notes.html" style="text-decoration:none;color:inherit;">
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M5 3h14v18H5z"/>
      </svg>
      <h3>Notes</h3>
      <p>Write & Save</p>
    </div>
  </a>

</div>

</body>
</html>
